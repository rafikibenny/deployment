name: Deploy Static Profile to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH || '/var/www/html' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "Missing GitHub secret: EC2_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "Missing GitHub secret: EC2_USER"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "Missing GitHub secret: EC2_SSH_KEY"
            exit 1
          fi

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p '$EC2_DEPLOY_PATH'"

      - name: Upload site files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -p $EC2_PORT" \
            index.html styles.css script.js \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$EC2_DEPLOY_PATH/"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo nginx -t && sudo systemctl reload nginx"
