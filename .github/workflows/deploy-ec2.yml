name: Deploy Static Profile to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "${{ secrets.EC2_PORT || 22 }}" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: |
          ssh -i ~/.ssh/ec2_key -p "${{ secrets.EC2_PORT || 22 }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p '${{ secrets.EC2_DEPLOY_PATH }}'"

      - name: Upload site files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -p ${{ secrets.EC2_PORT || 22 }}" \
            index.html styles.css script.js \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/ec2_key -p "${{ secrets.EC2_PORT || 22 }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo nginx -t && sudo systemctl reload nginx"
